<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Leg Validator</title>
<style>
  :root { --bg:#0b1220; --panel:#131c2e; --border:#243150; --text:#e6edf6; --muted:#8aa0c0; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:15px/1.5 system-ui,sans-serif; }
  header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  h1 { font-size:17px; font-weight:600; margin:0; }
  #title { font-size:15px; color:var(--text); }
  #counter { color:var(--muted); font-size:13px; }
  .btn { background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:9px;
         padding:8px 14px; cursor:pointer; font-size:14px; }
  .btn:hover { border-color:#3a4a6a; }
  .btn.ok { border-color:#2ec27e; color:#7fe0b0; }
  .btn.no { border-color:#f0556d; color:#f5a0ab; }
  .spacer { flex:1; }
  #chart { height:64vh; min-height:380px; }
  #legend { padding:10px 18px; display:flex; gap:16px; flex-wrap:wrap; font-size:13px; border-top:1px solid var(--border); }
  .lg { padding:3px 9px; border-radius:6px; background:var(--panel); border:1px solid var(--border); }
  .leg { color:#e8a13a; } .zone { color:#b98aff; } .entry { color:#4c8dff; } .sl { color:#f0556d; }
  #tally { padding:10px 18px; color:var(--muted); font-size:13px; border-top:1px solid var(--border); }
  #tally b.no { color:#f5a0ab; } #tally b.ok { color:#7fe0b0; }
</style>
</head>
<body>
  <header>
    <h1>Leg validator</h1>
    <span id="title">loading…</span>
    <span id="counter"></span>
    <span class="spacer"></span>
    <button class="btn" id="prev">‹ Prev</button>
    <button class="btn ok" id="mark-ok">✓ Looks right</button>
    <button class="btn no" id="mark-no">✗ Wrong</button>
    <button class="btn" id="next">Next ›</button>
  </header>
  <div id="chart"></div>
  <div id="legend">
    <span class="lg leg">orange line = the impulse leg (origin → extreme)</span>
    <span class="lg zone">violet = 0.5–0.618 entry zone</span>
    <span class="lg entry">blue = entry</span>
    <span class="lg sl">red = 0.786 stop</span>
    <span class="lg">gold dash = 0.382</span>
    <span class="lg">● dots = swing highs/lows (mountains/valleys)</span>
  </div>
  <div id="tally">Mark each leg ✓ or ✗. Wrong ones are listed here so you can tell me which to fix.</div>

  <script>
  const $ = (s) => document.querySelector(s);
  let DATA = [], i = 0, chart = null;
  const verdict = {};  // index -> 'ok' | 'no'

  function render() {
    const d = DATA[i];
    if (!d) return;
    $("#title").textContent = d.title;
    $("#counter").textContent = (i + 1) + " / " + DATA.length + (verdict[i] ? "  ·  " + (verdict[i] === "ok" ? "✓" : "✗") : "");
    const bars = d.bars, n = bars.length;
    const W = 960, H = 470, padT = 12, padB = 24, padL = 8, padR = 82;
    let lo = Infinity, hi = -Infinity;
    for (const b of bars) { lo = Math.min(lo, b.low); hi = Math.max(hi, b.high); }
    for (const v of [d.zoneHi, d.zoneLo, d.entry, d.sl, d.legStart.price, d.legEnd.price, d.retr382]) { lo = Math.min(lo, v); hi = Math.max(hi, v); }
    if (d.pivots) for (const p of d.pivots) { lo = Math.min(lo, p.price); hi = Math.max(hi, p.price); }
    const pad = (hi - lo) * 0.05 || 1; lo -= pad; hi += pad;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const X = (k) => padL + (k + 0.5) * plotW / n;
    const Y = (p) => padT + (hi - p) / (hi - lo) * plotH;
    const cw = Math.max(1.4, plotW / n * 0.62);
    const idx = {}; bars.forEach((b, k) => { idx[b.time] = k; });
    const f = (v) => (+v).toFixed(1);
    let s = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">`;
    const zt = Math.max(d.zoneHi, d.zoneLo), zb = Math.min(d.zoneHi, d.zoneLo);
    s += `<rect x="${padL}" y="${f(Y(zt))}" width="${plotW}" height="${f(Y(zb) - Y(zt))}" fill="rgba(185,138,255,0.13)"/>`;
    for (let k = 0; k < n; k++) {
      const b = bars[k], up = b.close >= b.open, col = up ? "#2ec27e" : "#f0556d";
      s += `<line x1="${f(X(k))}" y1="${f(Y(b.high))}" x2="${f(X(k))}" y2="${f(Y(b.low))}" stroke="${col}" stroke-width="1"/>`;
      const yo = Y(b.open), yc = Y(b.close), top = Math.min(yo, yc), h = Math.max(1, Math.abs(yo - yc));
      s += `<rect x="${f(X(k) - cw / 2)}" y="${f(top)}" width="${f(cw)}" height="${f(h)}" fill="${col}"/>`;
    }
    if (d.pivots && d.pivots.length) {
      const pp = d.pivots.filter((p) => idx[p.time] != null);
      if (pp.length > 1) s += `<polyline points="${pp.map((p) => f(X(idx[p.time])) + "," + f(Y(p.price))).join(" ")}" fill="none" stroke="#66789c" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>`;
      for (const p of pp) s += `<circle cx="${f(X(idx[p.time]))}" cy="${f(Y(p.price))}" r="3" fill="${p.kind === "high" ? "#ff9db0" : "#7fe0b0"}"/>`;
    }
    if (idx[d.legStart.time] != null && idx[d.legEnd.time] != null) {
      const xs = X(idx[d.legStart.time]), ys = Y(d.legStart.price), xe = X(idx[d.legEnd.time]), ye = Y(d.legEnd.price);
      s += `<line x1="${f(xs)}" y1="${f(ys)}" x2="${f(xe)}" y2="${f(ye)}" stroke="#e8a13a" stroke-width="2.5"/>`;
      s += `<circle cx="${f(xs)}" cy="${f(ys)}" r="4.5" fill="#e8a13a"/><circle cx="${f(xe)}" cy="${f(ye)}" r="4.5" fill="#e8a13a"/>`;
    }
    const hl = (p, col, dash, label) =>
      `<line x1="${padL}" y1="${f(Y(p))}" x2="${W - padR}" y2="${f(Y(p))}" stroke="${col}" stroke-width="1"${dash ? ' stroke-dasharray="5 3"' : ''}/>` +
      `<text x="${W - padR + 5}" y="${f(Y(p) + 4)}" fill="${col}" font-size="12">${label}</text>`;
    s += hl(d.retr382, "#e0b64d", true, "0.382");
    s += hl(d.zoneHi, "#b98aff", true, "zone");
    s += hl(d.zoneLo, "#b98aff", true, "zone");
    s += hl(d.entry, "#4c8dff", false, "entry " + d.entry);
    s += hl(d.sl, "#f0556d", true, "SL " + d.sl);
    s += `</svg>`;
    $("#chart").innerHTML = s;
  }
  function tally() {
    const wrong = DATA.map((d, k) => verdict[k] === "no" ? d.title : null).filter(Boolean);
    const ok = Object.values(verdict).filter((v) => v === "ok").length;
    $("#tally").innerHTML = `<b class="ok">${ok} ✓</b> · <b class="no">${wrong.length} ✗</b>` +
      (wrong.length ? " — wrong: " + wrong.map((w) => "<b class='no'>" + w + "</b>").join(", ") : " — mark each leg ✓ or ✗");
  }
  const go = (n) => { i = (i + n + DATA.length) % DATA.length; render(); };
  const mark = (v) => { verdict[i] = v; tally(); if (i < DATA.length - 1) go(1); else render(); };
  $("#prev").onclick = () => go(-1);
  $("#next").onclick = () => go(1);
  $("#mark-ok").onclick = () => mark("ok");
  $("#mark-no").onclick = () => mark("no");
  document.onkeydown = (e) => {
    if (e.key === "ArrowLeft") go(-1); else if (e.key === "ArrowRight") go(1);
    else if (e.key === "y") mark("ok"); else if (e.key === "n") mark("no");
  };
