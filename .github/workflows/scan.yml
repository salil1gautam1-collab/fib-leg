name: fib-leg scan

# Runs every 15 min during NSE market hours (09:15–15:30 IST = 03:45–10:00 UTC),
# Mon–Fri. Scheduled runs can be delayed a few minutes by GitHub — fine for 15m bars.
on:
  schedule:
    - cron: "*/15 3-10 * * 1-5"
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write              # commit docs/signals.json back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      # Default source is yfinance (no account/secrets needed). Switch to "dhan"
      # once DHAN_CLIENT_ID / DHAN_ACCESS_TOKEN secrets are set (Settings → Secrets).
      SCAN_SOURCE: yf
      DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
      DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance dhanhq

      - name: Run scan
        run: python scan.py --source "$SCAN_SOURCE"

      - name: Commit updated feed
        run: |
          git config user.name  "fib-leg-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/signals.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "scan: update signals feed [skip ci]"
            git push
          fi
